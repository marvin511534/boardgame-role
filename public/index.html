<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>桌遊身份抽籤</title>

    <link
        rel="stylesheet"
        href="style.css"
    >
</head>

<body>
    <main class="container">

        <!-- 首頁 -->
        <section
            id="homePage"
            class="panel"
        >
            <div class="logo-icon">
                🎴
            </div>

            <h1>桌遊身份抽籤</h1>

            <p class="description">
                建立房間後，朋友可以掃描 QR Code
                加入並抽取身份。
            </p>

            <div class="section-box">
                <h2 class="section-title">
                    建立房間
                </h2>

                <label for="playerCount">
                    選擇玩家人數
                </label>

                <select id="playerCount">
                    <option value="4">
                        4 人
                    </option>

                    <option value="5">
                        5 人
                    </option>

                    <option
                        value="6"
                        selected
                    >
                        6 人
                    </option>

                    <option value="7">
                        7 人
                    </option>

                    <option value="8">
                        8 人
                    </option>
                </select>

                <div
                    id="rolePreview"
                    class="role-preview"
                ></div>

                <button
                    id="createRoomButton"
                    class="primary-button"
                >
                    建立房間
                </button>
            </div>

            <div class="divider">
                或
            </div>

            <div class="section-box">
                <h2 class="section-title">
                    加入房間
                </h2>

                <label for="roomCodeInput">
                    房號
                </label>

                <input
                    id="roomCodeInput"
                    type="text"
                    maxlength="6"
                    autocomplete="off"
                    placeholder="例如 ABC123"
                >

                <label for="playerNameInput">
                    玩家名稱
                </label>

                <input
                    id="playerNameInput"
                    type="text"
                    maxlength="12"
                    autocomplete="off"
                    placeholder="請輸入名稱"
                >

                <button
                    id="joinRoomButton"
                    class="join-button"
                >
                    加入房間
                </button>
            </div>

            <p
                id="homeMessage"
                class="message"
            ></p>
        </section>

        <!-- 房主等待畫面 -->
        <section
            id="hostRoomPage"
            class="panel hidden"
        >
            <div class="status-badge">
                房主模式
            </div>

            <h1>房間建立成功</h1>

            <p class="small-label">
                房號
            </p>

            <div
                id="hostRoomCode"
                class="room-code"
            ></div>

            <img
                id="qrCodeImage"
                class="qr-code"
                alt="加入房間 QR Code"
            >

            <p class="small-label">
                玩家加入網址
            </p>

            <p
                id="joinUrl"
                class="join-url"
            ></p>

            <div class="player-header">
                <h2>玩家名單</h2>

                <span
                    id="playerProgress"
                    class="player-progress"
                >
                    0 / 0
                </span>
            </div>

            <ul
                id="playerList"
                class="player-list"
            >
                <li class="empty-player">
                    等待玩家加入……
                </li>
            </ul>

            <button
                id="startGameButton"
                class="primary-button"
                disabled
            >
                等待玩家加入
            </button>

            <button
                id="closeRoomButton"
                class="danger-outline-button"
            >
                關閉房間
            </button>

            <p
                id="hostMessage"
                class="message"
            ></p>
        </section>

        <!-- 玩家等待畫面 -->
        <section
            id="waitingPage"
            class="panel hidden"
        >
            <div class="logo-icon">
                ✅
            </div>

            <h1>加入成功</h1>

            <div class="info-box">
                <p>
                    玩家名稱
                </p>

                <strong
                    id="waitingPlayerName"
                ></strong>
            </div>

            <div class="info-box">
                <p>房號</p>

                <strong
                    id="waitingRoomCode"
                ></strong>
            </div>

            <p class="description">
                請等待其他玩家加入，房主開始後，
                你的身份會顯示在這支手機上。
            </p>

            <div class="loading-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <p
                id="waitingMessage"
                class="message"
            ></p>
        </section>

        <!-- 玩家身份畫面 -->
        <section
            id="rolePage"
            class="panel hidden"
        >
            <p class="small-label">
                你的身份
            </p>

            <div
                id="roleCard"
                class="role-card"
            >
                <div
                    id="roleIcon"
                    class="role-icon"
                >
                    🎴
                </div>

                <div
                    id="roleName"
                    class="role-name"
                ></div>
            </div>

            <p class="description">
                請記住自己的身份，不要讓其他玩家看到。
            </p>

            <button
                id="hideRoleButton"
                class="primary-button"
            >
                我記住了，隱藏身份
            </button>
        </section>

        <!-- 身份隱藏畫面 -->
        <section
            id="roleHiddenPage"
            class="panel hidden"
        >
            <div class="logo-icon">
                🔒
            </div>

            <h1>身份已隱藏</h1>

            <p class="description">
                請將手機放好，準備開始遊戲。
            </p>

            <button
                id="showRoleAgainButton"
                class="secondary-button"
            >
                再次查看身份
            </button>
        </section>

        <!-- 房主遊戲開始畫面 -->
        <section
            id="hostStartedPage"
            class="panel hidden"
        >
            <div class="logo-icon">
                ✅
            </div>

            <h1>身份分配完成</h1>

            <p class="description">
                所有玩家都已收到自己的身份。
            </p>

            <div class="info-box">
                <p>房號</p>

                <strong
                    id="startedRoomCode"
                ></strong>
            </div>

            <button
                id="restartGameButton"
                class="primary-button"
            >
                重新抽取身份
            </button>

            <button
                id="closeStartedRoomButton"
                class="danger-outline-button"
            >
                關閉房間
            </button>

            <p
                id="startedMessage"
                class="message"
            ></p>
        </section>

    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
